<body class="bg-background font-body-md text-on-surface">
<!-- Top Navigation Anchor (Manual construction based on JSON instructions for branding) -->
<header class="bg-surface docked full-width top-0 border-b border-surface-variant flex justify-between items-center px-margin-mobile h-12 w-full max-w-7xl mx-auto">
<div class="flex items-center gap-xs">

<span class="font-headline-sm text-headline-sm font-bold text-primary">GenZ eSports</span>
</div>
<button class="text-on-surface-variant font-body-md hover:opacity-80 transition-opacity active:scale-95 duration-200">Skip</button>
</header>
<main class="min-h-[calc(100vh-48px)] flex flex-col items-center justify-start px-margin-mobile pt-lg pb-xl max-w-md mx-auto">
<!-- Header Messaging -->
<div class="w-full mb-lg text-center">
<h1 class="font-headline-md text-headline-md text-on-surface mb-xs">Join the Arena</h1>
<p class="font-body-md text-on-surface-variant">Create your professional profile and compete</p>
</div>
<!-- Form Card -->
<div class="bg-surface-container-lowest w-full p-md rounded-lg shadow-level-1 border border-surface-variant">
<form class="flex flex-col gap-md">
<!-- Full Name -->
<div class="flex flex-col gap-xs">
<label class="font-label-md text-label-md text-on-surface-variant ml-xs" for="full_name">Full Name</label>
<input class="h-[48px] w-full px-md rounded-lg border border-outline-variant focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-colors bg-white" id="full_name" placeholder="Enter your legal name" type="text"/>
</div>
<!-- Email -->
<div class="flex flex-col gap-xs">
<label class="font-label-md text-label-md text-on-surface-variant ml-xs" for="email">Email</label>
<input class="h-[48px] w-full px-md rounded-lg border border-outline-variant focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-colors bg-white" id="email" placeholder="name@organization.com" type="email"/>
</div>
<!-- Role Dropdown -->
<div class="flex flex-col gap-xs">
<label class="font-label-md text-label-md text-on-surface-variant ml-xs" for="role">Role</label>
<div class="relative">
<select class="appearance-none h-[48px] w-full px-md rounded-lg border border-outline-variant focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-colors bg-white" id="role">
<option value="player">Player</option>
<option value="admin">Admin</option>
<option value="organizer">Organizer</option>
</select>
<div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-md text-outline">
<span class="material-symbols-outlined" data-icon="expand_more">expand_more</span>
</div>
</div>
</div>
<!-- Password -->
<div class="flex flex-col gap-xs">
<label class="font-label-md text-label-md text-on-surface-variant ml-xs" for="password">Password</label>
<input class="h-[48px] w-full px-md rounded-lg border border-outline-variant focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-colors bg-white" id="password" placeholder="••••••••" type="password"/>
</div>
<!-- Confirm Password -->
<div class="flex flex-col gap-xs">
<label class="font-label-md text-label-md text-on-surface-variant ml-xs" for="confirm_password">Confirm Password</label>
<input class="h-[48px] w-full px-md rounded-lg border border-outline-variant focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-colors bg-white" id="confirm_password" placeholder="••••••••" type="password"/>
</div>
<!-- Submit Button -->
<button class="h-[48px] w-full bg-primary text-on-primary font-body-lg rounded-lg shadow-level-1 hover:opacity-90 active:scale-[0.98] transition-all mt-sm" type="submit">
                    Create Account
                </button>
</form>
<!-- Divider -->
<div class="flex items-center gap-md my-lg">
<div class="h-[1px] flex-grow bg-surface-variant"></div>
<span class="font-label-md text-label-md text-outline">OR</span>
<div class="h-[1px] flex-grow bg-surface-variant"></div>
</div>
<!-- Social Signup -->
<button class="h-[48px] w-full flex items-center justify-center gap-sm bg-white border border-outline-variant rounded-lg font-body-md text-on-surface hover:bg-surface-container-low active:scale-[0.98] transition-all">

<span>Sign up with Google</span>

</p>
