<style>
        .shadow-level-1 {
            box-shadow: 0px 2px 4px rgba(0, 0, 0, 0.05);
        }
        body {
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>
<body class="bg-surface min-h-screen flex flex-col items-center justify-between py-xl">
<!-- Top: Brand Identity -->
<header class="w-full flex flex-col items-center justify-center px-margin-mobile mt-lg">
<div class="mb-md">
<img alt="GenZ eSports Logo" class="w-16 h-16 object-contain" src="https://lh3.googleusercontent.com/aida/ADBb0uhH6RXGDtNOuD8LVw0btluTZIZG0Fgx7OqaDZeaCVO-ceiPEOUieYDcud60g_-GTWYHqOFLvpsiQvfLkOM7KvdQfM4wXF0o5Kdml2hYVOpT4Di0TgCx6S6m1VdiQT_1sXp__5h9y8jYY-7FFHm4WJJTiq3vnzJsDMb9oW8B42PVQJcB0GPIXD-HlFPLp5-pb0QRes-NPRgDMF2r_sB0DSidSfUfxeDcqbDSn041x6o9WSQ-G8SC0mUuu1g"/>
</div>
<h1 class="font-headline-md text-headline-md text-primary">GenZ eSports</h1>
</header>
<!-- Center: Login Card -->
<main class="w-full max-w-md px-margin-mobile flex-grow flex flex-col justify-center">
<div class="bg-surface-container-lowest p-lg rounded-lg shadow-level-1 w-full">
<h2 class="font-headline-sm text-headline-sm text-on-surface mb-xl">Sign In</h2>
<form class="space-y-md">
<!-- Email Field -->
<div class="flex flex-col gap-xs">
<label class="font-label-md text-label-md text-on-surface-variant" for="email">Email</label>
<input class="h-12 border border-outline-variant rounded-lg px-md font-body-md text-body-md focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary bg-surface-bright" id="email" placeholder="name@example.com" type="email"/>
</div>
<!-- Password Field -->
<div class="flex flex-col gap-xs">
<div class="flex justify-between items-center">
<label class="font-label-md text-label-md text-on-surface-variant" for="password">Password</label>
<a class="font-label-md text-label-md text-primary hover:underline" href="#">Forgot Password?</a>
</div>
<div class="relative">
<input class="w-full h-12 border border-outline-variant rounded-lg px-md font-body-md text-body-md focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary bg-surface-bright" id="password" placeholder="••••••••" type="password"/>
</div>
</div>
<!-- Login Button -->
<button class="w-full h-12 bg-primary text-on-primary font-label-md text-label-md rounded-lg flex items-center justify-center hover:opacity-90 active:scale-95 transition-all mt-sm" type="button">
                    Login
                </button>
</form>
<!-- OR Separator -->
<div class="flex items-center my-lg">
<div class="flex-grow h-px bg-outline-variant"></div>
<span class="px-md font-label-sm text-label-sm text-outline uppercase tracking-wider">OR</span>
<div class="flex-grow h-px bg-outline-variant"></div>
</div>
<!-- Social Login -->
<button class="w-full h-12 border border-outline-variant bg-surface-bright text-on-surface font-label-md text-label-md rounded-lg flex items-center justify-center gap-sm hover:bg-surface-container-low active:scale-98 transition-all" type="button">
<svg height="18" viewbox="0 0 18 18" width="18">
<path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.874 2.684-6.615z" fill="#4285F4"></path>
<path d="M9 18c2.43 0 4.467-.806 5.956-2.184l-2.908-2.258c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 009 18z" fill="#34A853"></path>
<path d="M3.964 10.712c-.18-.54-.282-1.117-.282-1.712s.102-1.173.282-1.712V4.956H.957a9.006 9.006 0 000 8.088l3.007-2.332z" fill="#FBBC05"></path>
<path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 00.957 4.956L3.964 7.288c.708-2.127 2.692-3.708 5.036-3.708z" fill="#EA4335"></path>
</svg>
                Continue with Google
            </button>
</div>
</main>
<!-- Bottom: Navigation Footer -->
<footer class="w-full text-center px-margin-mobile mb-lg">
<p class="font-body-md text-body-md text-on-surface-variant">
            Don't have an account? 
            <a class="text-primary font-bold hover:underline" href="#">Sign Up</a>
</p>
</footer>
<!-- No Shared Components rendered as this is a focused transactional Login page -->
</body></html>
